    <script>
      const DEBUG_MODE = false;

      const debugLog = (...args) => {
        if (DEBUG_MODE) {
          console.log('[FRONTROW]', ...args);
        }
      };

      const CONFIG = {
        MIN_HEIGHT: 0,
        MAX_HEIGHT: 200,
        UPDATE_DELAY: 50,
        RESIZE_DEBOUNCE: 100,
        MAX_RETRIES: 3,
        RETRY_DELAY: 500
      };

      debugLog('WIDGET_INITIALIZED_WITH_CONFIG:', CONFIG);

      const state = {
        lastHeight: 0,
        isUpdating: false,
        retryCount: 0,
        isInitialized: false
      };

      function getSafeUrl() {
        try {
          return window?.parent?.location?.href || window?.location?.href || '';
        } catch (e) {
          return '';
        }
      }

      function frTrack(event, opts = {}) {
        try {
          window.parent.postMessage({
            name: 'TRACK_FMD_EVENT',
            widgetId: 8614,
            eventName: event,
            properties: {
              ...opts,
              healthBrandProductId: 3845,
              bundleId: null,
              presentationType: 'brand',
              url: getSafeUrl(),
              widget_version: '8',
              is_sticky: false
            }
          }, '*');
        } catch (e) {}
      }

      function openFrontrowModal(){
        try {
          debugLog('OPENING_FRONTROW_MODAL');
          window.parent.postMessage("OPEN_MODAL", "*");
        } catch (e) {
          debugLog('ERROR_OPENING_MODAL:', e);
        }
      }

      function getContentHeight() {
        try {
          const b = document.querySelector("body");
          if (!b) {
            debugLog('BODY_ELEMENT_NOT_FOUND');
            return CONFIG.MIN_HEIGHT;
          }

          const scrollHeight = Math.max(
            b.scrollHeight,
            b.offsetHeight,
            b.clientHeight
          );

          const height = Math.min(Math.max(scrollHeight, CONFIG.MIN_HEIGHT), CONFIG.MAX_HEIGHT);
          debugLog('CONTENT_HEIGHT_CALCULATED:', { scrollHeight, finalHeight: height });
          return height;
        } catch (e) {
          debugLog('ERROR_CALCULATING_HEIGHT:', e);
          return CONFIG.MIN_HEIGHT;
        }
      }

      function updateHeight() {
        if (state.isUpdating) {
          debugLog('HEIGHT_UPDATE_IN_PROGRESS');
          return;
        }

        try {
          const height = getContentHeight();

          if (height !== state.lastHeight && height >= CONFIG.MIN_HEIGHT) {
            debugLog('UPDATING_HEIGHT:', { oldHeight: state.lastHeight, newHeight: height });
            state.isUpdating = true;
            state.lastHeight = height;

            window.parent.postMessage({name: "RESIZE_HEIGHT", value: height}, "*");

            setTimeout(() => {
              state.isUpdating = false;
              debugLog('HEIGHT_UPDATE_COMPLETED');
            }, CONFIG.UPDATE_DELAY);
          }
        } catch (e) {
          debugLog('ERROR_UPDATING_HEIGHT:', e);
          state.isUpdating = false;
        }
      }

      function showIframe() {
        try {
          debugLog('SHOWING_IFRAME');
          document.body.style.display = 'block';
        } catch (e) {
          debugLog('ERROR_SHOWING_IFRAME:', e);
        }
      }

      function handleOnLoad() {
        if (state.isInitialized) {
          debugLog('WIDGET_ALREADY_INITIALIZED');
          return;
        }

        // Request ready status from parent
        window.parent.postMessage({ name: "BRAND_REQUEST_READY_STATUS" }, "*");

        // Listen for parent's ready signal
        window.addEventListener("message", function initListener(event) {
          if (event.data?.name === "PARENT_READY") {
            window.removeEventListener("message", initListener);

            document.fonts.ready.then(() => {
              try {
                const height = getContentHeight();

                if (height >= CONFIG.MIN_HEIGHT) {
                  debugLog('INITIAL_HEIGHT_SET:', height);
                  state.lastHeight = height;
                  window.parent.postMessage({name: "RESIZE_HEIGHT", value: height}, "*");
                  showIframe();

                  setTimeout(() => {
                    const newHeight = getContentHeight();
                    if (newHeight !== height && newHeight >= CONFIG.MIN_HEIGHT) {
                      debugLog('HEIGHT_CHANGED_AFTER_INITIAL_LOAD:', { oldHeight: height, newHeight });
                      updateHeight();
                      state.isInitialized = true;
                      debugLog('WIDGET_INITIALIZED');
                    }
                  }, CONFIG.RETRY_DELAY);
                } else if (state.retryCount < CONFIG.MAX_RETRIES) {
                  state.retryCount++;
                  debugLog('RETRYING_INITIALIZATION:', { attempt: state.retryCount });
                  setTimeout(handleOnLoad, CONFIG.RETRY_DELAY);
                }
              } catch (e) {
                debugLog('ERROR_IN_HANDLE_ON_LOAD:', e);
              }
            }).catch((error) => {
              debugLog('FONT_LOADING_ERROR:', error);
              handleOnLoad();
            });
          }
        });

        // Set a timeout to retry if no response received
        setTimeout(() => {
          if (!state.isInitialized && state.retryCount < CONFIG.MAX_RETRIES) {
            state.retryCount++;
            debugLog('RETRYING_INITIALIZATION:', { attempt: state.retryCount });
            handleOnLoad();
          }
        }, CONFIG.RETRY_DELAY);
      }

      function scrollToTestimonials(e) {
        try {
          debugLog('SCROLLING_TO_TESTIMONIALS');
          e.stopPropagation();
          window.parent.postMessage("SCROLL_TO_TESTIMONIALS", "*");
        } catch (e) {
          debugLog('ERROR_SCROLLING_TO_TESTIMONIALS:', e);
        }
      }

      function clickShowAll(e) {
        try {
          debugLog('OPENING_TESTIMONIALS_MODAL');
          e.stopPropagation();
          window.parent.postMessage({name: "OPEN_TESTIMONIALS_MODAL", source: "widget_click_read_why_they_did"}, "*");
        } catch (e) {
          debugLog('ERROR_SHOWING_ALL:', e);
        }
      }

      function debounce(func, timeout) {
        let timer;
        return (...args) => {
          clearTimeout(timer);
          timer = setTimeout(() => { func.apply(this, args); }, timeout);
        };
      }

      try {
        debugLog('SETTING_UP_EVENT_LISTENERS');
        window.addEventListener("resize", debounce(updateHeight, CONFIG.RESIZE_DEBOUNCE));

        let stickyChanged = false;
        window.addEventListener("message", ev => {
          try {
            debugLog('MESSAGE_RECEIVED:', ev.data);

            if(stickyChanged) {
              debugLog('STICKY_ALREADY_CHANGED_IGNORING_MESSAGE');
              return;
            }

            if(ev.data?.name === "CHANGE_STICKY") {
              debugLog('CHANGING_TO_STICKY_MODE');
              const b = document.querySelector("#sticky");
              if (b) {
                b.style.display = "flex";
                const embedded = document.querySelector("#embedded");
                if (embedded) {
                  embedded.style.display = "none";
                }
                stickyChanged = true;
                debugLog('STICKY_MODE_ACTIVATED');
              }
            }
          } catch (e) {
            debugLog('ERROR_HANDLING_MESSAGE:', e);
          }
        });
      } catch (e) {
        debugLog('ERROR_SETTING_UP_EVENT_LISTENERS:', e);
      }
    </script>

  }
}
